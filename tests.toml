#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/tests.v1.schema.json

test_format = 1.0

[default]
    # ------------
    # Tests to run
    # ------------

    preinstall = """
    sudo yunohost tools update apps
    sudo yunohost domain add dex.domain.tld
    sudo yunohost app install dex -f -a "domain=dex.domain.tld&path=/&oidc_name=&oidc_secret=&oidc_callback"

    sudo yunohost domain add versitygw.domain.tld
    sudo yunohost app install versitygw -f -a "domain=versitygw.domain.tld&init_main_permission=visitors"

    echo "✅ End of preinstall"
    """

    preupgrade = """
    if [ "$FROM_COMMIT" == "5d1c5af" ]; then
        echo "🔧 Enabling celery..."
        sudo yunohost app config set $APP main.advanced.enable_celery -v yes
    fi
    echo "✅ End of preupgrade"
    """

    # -------------------------------
    # Default args to use for install
    # -------------------------------

    args.dex = "dex"
    args.s3 = "versitygw"

